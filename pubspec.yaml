
name: flutter_iot_cake_fast_app
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8 #ใช้สำหรับไอคอนสไตล์ iOS
  google_fonts: ^8.0.1 #ใช้สำหรับการใช้ฟอนต์จาก Google Fonts
  font_awesome_flutter: ^10.12.0 #ใช้สำหรับไอคอนเพิ่มเติม
  url_launcher: ^6.3.2 #ใช้สำหรับการเปิดลิงก์ภายนอก
  carousel_slider: ^5.1.2 #ใช้สำหรับการสร้างสไลด์โชว์
  # dots_indicator: ^4.0.1 #ใช้สำหรับแสดงจุดบ่งชี้ในสไลด์โชว์
  flutter_map: ^8.2.2 #ใช้สำหรับแผนที่
  latlong2: ^0.9.1 #ใช้สำหรับการจัดการพิก
  # map_launcher: ^4.4.3 #ใช้สำหรับการเปิดแอปแผนที่ภายนอก

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  icons_launcher: ^3.0.3 #ใช้สำหรับการสร้างไอคอนแอป

flutter:

  uses-material-design: true
  assets:
    - assets/images/


icons_launcher:
  image_path: "assets/icon/Cakeic.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true
